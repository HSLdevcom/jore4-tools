name: Shared check renovatebot config

on:
  workflow_call:
    inputs:
      config_file_path:
        description: Path to the Renovatebot config file to validate
        type: string
        required: true
      checkout_submodules:
        description: Whether to checkout submodules
        type: string
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  validate:
    name: Validate renovatebot config
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: ${{ inputs.checkout_submodules }}

      - name: Validate config
        uses: suzuki-shunsuke/github-action-renovate-config-validator@ee9f69e1f683ed0d08225086482b34fc9abe9300 # v2.1.0
        with:
          config_file_path: ${{ inputs.config_file_path }}
